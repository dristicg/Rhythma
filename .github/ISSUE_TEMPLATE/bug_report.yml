name: Bug Report
description: Report something in Rhythma that isn't working as expected.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Rhythma! A few things before you file:

        - **Security vulnerability?** Please don't use this form — see [SECURITY.md](https://github.com/ishita2740/Rhythma/blob/main/SECURITY.md) for how to report it privately instead.
        - **Search first** — check [open and closed issues](https://github.com/ishita2740/Rhythma/issues?q=is%3Aissue) to avoid filing a duplicate.
        - The more detail you give below, the faster this can be triaged and fixed.

  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This is not a security vulnerability (see note above).
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project does this affect?
      options:
        - Mobile app (rhythma_flutter/)
        - Backend (backend/)
        - Web app (web/)
        - Landing page (landing-page/)
        - Documentation
        - CI / tooling
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen instead?
      placeholder: |
        e.g. "Logging a cycle entry in the app doesn't show up on the calendar until I restart the app."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps a reviewer can follow to see the bug themselves.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect usage? (Best guess is fine — maintainers may adjust this.)
      options:
        - Low — cosmetic, minor annoyance
        - Medium — a feature doesn't work as expected but there's a workaround
        - High — a core feature is broken or data is lost/incorrect
        - Critical — crash, security-adjacent, or affects all users
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/device, app version or commit hash, browser (if web), Flutter/Python/Node version if relevant.
      placeholder: |
        e.g. Android 14, Pixel 7, Rhythma app built from commit abc1234
        e.g. macOS 15, Chrome 138, web/ running via `npm run dev`
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots, recordings, or logs
      description: Drag and drop images/videos here, or paste relevant error output / stack traces. Please redact any personal health data before attaching.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to submit a PR to fix this myself.
          required: false
